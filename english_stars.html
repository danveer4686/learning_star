<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 English Star – Learn & Speak!</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1b4b;
  --bg2: #162363;
  --gold: #FFD700;
  --gold2: #FFA500;
  --white: #ffffff;
  --radius-lg: 30px;
  --radius-md: 20px;
  --shadow: 0 8px 32px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Nunito',sans-serif;
  background: radial-gradient(ellipse at top, #1a2f80 0%, #0a1235 60%, #060d24 100%);
  min-height:100vh;
  color:var(--white);
  overflow-x:hidden;
}

/* ===== STARS BG ===== */
#starfield {
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.star-dot {
  position:absolute;border-radius:50%;background:white;
  animation:twinkle ease-in-out infinite alternate;
}
@keyframes twinkle{from{opacity:.2;transform:scale(1);}to{opacity:1;transform:scale(1.5);}}

/* ===== HEADER ===== */
header {
  position:relative;z-index:2;
  text-align:center;
  padding:30px 16px 12px;
}
.header-title {
  font-family:'Baloo 2',cursive;
  font-size:clamp(2rem,6vw,3.8rem);
  font-weight:800;
  background:linear-gradient(135deg,#FFD700,#FF8C00,#FFD700);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  filter:drop-shadow(0 0 18px rgba(255,200,0,0.5));
  line-height:1.1;
}
.header-sub {
  font-size:1.05rem;
  color:#aac4ff;
  margin-top:6px;
  font-weight:700;
}

/* ===== SPEED CONTROL ===== */
.speed-row {
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:10px 16px;
  flex-wrap:wrap;
}
.speed-label{font-size:0.95rem;font-weight:800;color:#aac4ff;}
.speed-btn {
  font-family:'Baloo 2',cursive;font-weight:700;font-size:0.9rem;
  border:2px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08);
  color:white;border-radius:50px;padding:6px 16px;cursor:pointer;
  transition:all 0.15s;
}
.speed-btn.sel {
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  border-color:transparent;color:#000;
  box-shadow:0 4px 16px rgba(255,180,0,0.45);
}
.speed-btn:hover:not(.sel){background:rgba(255,255,255,0.15);}

/* ===== SEARCH BAR ===== */
.search-row {
  position:relative;z-index:2;
  display:flex;justify-content:center;
  padding:6px 16px 12px;
}
.search-box {
  width:100%;max-width:500px;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:50px;
  padding:10px 20px;
  font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;
  color:white;outline:none;
  transition:border 0.2s,background 0.2s;
}
.search-box::placeholder{color:rgba(255,255,255,0.45);}
.search-box:focus{border-color:#FFD700;background:rgba(255,255,255,0.15);}

/* ===== TABS STRIP ===== */
.tabs-wrapper {
  position:sticky;top:0;z-index:10;
  background:linear-gradient(180deg,#0d1b4b 85%,transparent 100%);
  padding:10px 12px 8px;
}
.tabs-scroll {
  display:flex;gap:8px;overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.2) transparent;
}
.tabs-scroll::-webkit-scrollbar{height:4px;}
.tabs-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:10px;}
.tab-btn {
  flex-shrink:0;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:0.92rem;
  border:none;border-radius:50px;
  padding:8px 18px;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s,background 0.15s;
  white-space:nowrap;
  color:rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.1);
  border:1.5px solid rgba(255,255,255,0.15);
}
.tab-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,0.18);}
.tab-btn.active{
  color:#000;font-weight:800;
  transform:translateY(-3px) scale(1.06);
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
  border-color:transparent;
}

/* ===== STAGE ===== */
.stage {
  position:relative;z-index:1;
  max-width:760px;margin:16px auto 100px;
  padding:0 14px;
}

.cat-title {
  font-family:'Baloo 2',cursive;font-weight:800;
  font-size:clamp(1.6rem,5vw,2.4rem);
  text-align:center;margin-bottom:20px;
  filter:drop-shadow(0 0 12px rgba(255,220,0,0.4));
}

/* ===== SENTENCE CARDS ===== */
.sentence-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;}

.group-label {
  font-family:'Baloo 2',cursive;font-size:0.8rem;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin:18px 0 6px 6px;
}

.sentence-card {
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;
  border-radius:22px;
  cursor:pointer;
  transition:transform 0.18s,box-shadow 0.18s;
  animation:cardIn 0.4s ease both;
  border:1.5px solid rgba(255,255,255,0.12);
  position:relative;overflow:hidden;
}
.sentence-card::before {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.02));
  pointer-events:none;
}
.sentence-card:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 14px 40px rgba(0,0,0,0.4);}
.sentence-card:active{transform:scale(0.98);}
.sentence-card.played::after {
  content:'✓';
  position:absolute;top:10px;right:62px;
  font-size:1rem;font-weight:900;color:rgba(255,255,255,0.4);
}

@keyframes cardIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.card-emoji {
  font-size:2.8rem;flex-shrink:0;
  width:56px;text-align:center;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.4));
  transition:transform 0.3s;
}
.sentence-card:hover .card-emoji{transform:scale(1.2) rotate(-5deg);}

.card-body{flex:1;min-width:0;}
.card-sentence {
  font-family:'Baloo 2',cursive;font-weight:800;
  font-size:clamp(1.2rem,3.5vw,1.55rem);
  color:#fff;line-height:1.25;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}
.card-pronun {
  font-size:0.82rem;font-weight:700;
  color:rgba(200,220,255,0.7);
  margin-top:3px;font-style:italic;
  letter-spacing:0.3px;
}

.speak-btn {
  width:52px;height:52px;flex-shrink:0;
  border-radius:50%;border:none;cursor:pointer;
  font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  position:relative;z-index:1;
}
.speak-btn:hover{transform:scale(1.18);}
.speak-btn:active{transform:scale(0.92);}
.speak-btn.speaking{animation:speakPulse 0.5s ease infinite alternate;}
@keyframes speakPulse{from{transform:scale(1);}to{transform:scale(1.28);box-shadow:0 0 0 8px rgba(255,200,0,0.25);}}

/* ===== STAR BAR ===== */
.star-bar {
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:100;
  background:linear-gradient(135deg,#1a2060,#0f1540);
  border:2px solid rgba(255,215,0,0.5);
  border-radius:50px;
  padding:10px 24px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  font-family:'Baloo 2',cursive;font-weight:800;
}
.star-bar-label{font-size:0.95rem;color:#aac4ff;}
.star-bar-count{font-size:1.5rem;color:#FFD700;text-shadow:0 0 12px rgba(255,200,0,0.6);}
.star-bar-progress {
  display:flex;gap:4px;
}
.star-pip {
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,0.15);transition:background 0.3s,transform 0.3s;
}
.star-pip.lit{background:#FFD700;transform:scale(1.2);box-shadow:0 0 6px rgba(255,200,0,0.8);}

/* ===== CONFETTI ===== */
.confetti-piece {
  position:fixed;pointer-events:none;z-index:300;
  font-size:1.8rem;
  animation:confettiFly 1.4s ease-out forwards;
}
@keyframes confettiFly {
  0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1);}
  100%{opacity:0;transform:translateY(-220px) rotate(60deg) scale(0.5);}
}

/* ===== BRAVO OVERLAY ===== */
.bravo-overlay {
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.bravo-box {
  font-family:'Baloo 2',cursive;font-weight:800;
  font-size:clamp(2.5rem,8vw,5rem);
  text-align:center;
  background:linear-gradient(135deg,#FFD700,#FF8C00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,160,0,0.8));
  animation:bravoAnim 2.5s ease-out forwards;
}
@keyframes bravoAnim {
  0%{opacity:0;transform:scale(0.3) rotate(-10deg);}
  15%{opacity:1;transform:scale(1.15) rotate(3deg);}
  30%{transform:scale(1) rotate(0deg);}
  70%{opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.2);}
}

/* ===== SEARCH RESULTS ===== */
.search-results-title {
  font-family:'Baloo 2',cursive;font-weight:800;
  font-size:1.3rem;color:#aac4ff;
  text-align:center;margin-bottom:16px;
}

/* ===== SCROLLTOP ===== */
.scroll-top {
  position:fixed;right:20px;bottom:80px;z-index:99;
  width:44px;height:44px;border-radius:50%;border:none;
  background:rgba(255,215,0,0.85);color:#000;
  font-size:1.3rem;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,0.4);
  display:none;align-items:center;justify-content:center;
  transition:opacity 0.2s;
}
.scroll-top.visible{display:flex;}
</style>
</head>

<button class="scroll-top" id="scrollTop">↑</button>

(function buildPips(){
  const c=document.getElementById('starPips');
  for(let i=0;i<10;i++){
    const p=document.createElement('div');
    p.className='star-pip';p.id='pip'+i;

function updatePips(){
  for(let i=0;i<10;i++){
    document.getElementById('pip'+i).classList.toggle('lit',i<(stars%10));
  }
}

// ============================================================
//  TABS
// ============================================================
function buildTabs(){
  const ts=document.getElementById('tabsScroll');
  ts.innerHTML='';
  CATS.forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===activeIdx?' active':'');
    btn.textContent=cat.label;
    btn.style.background=i===activeIdx?PALETTE[i%PALETTE.length]:'rgba(255,255,255,0.1)';
    btn.style.color=i===activeIdx?'#000':'rgba(255,255,255,0.75)';
    btn.addEventListener('click',()=>switchCat(i));
    ts.appendChild(btn);
  });
}

function switchCat(i){
  searchMode=false;
  document.getElementById('searchBox').value='';
  activeIdx=i;
  buildTabs();
  buildStage();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ============================================================
//  STAGE
// ============================================================
function buildStage(){
  const stage=document.getElementById('stage');
  stage.innerHTML='';

  if(searchMode){
    const h=document.createElement('div');
    h.className='search-results-title';
    h.textContent=`🔍 Found ${searchResults.length} sentences`;
    stage.appendChild(h);
    if(searchResults.length===0){
      const m=document.createElement('div');
      m.style.cssText='text-align:center;color:rgba(255,255,255,0.4);font-size:1.2rem;padding:40px;';
      m.textContent='No sentences found. Try a different word!';
      stage.appendChild(m);
      return;
    }
    const grid=document.createElement('div');
    grid.className='sentence-grid';
    searchResults.forEach((item,idx)=>{
      grid.appendChild(buildCard(item.s,item.catIdx,idx*60));
    });
    stage.appendChild(grid);
    return;
  }

  const cat=CATS[activeIdx];
  const color=PALETTE[activeIdx%PALETTE.length];

  const title=document.createElement('div');
  title.className='cat-title';
  title.style.color=color;
  title.textContent=cat.label;
  stage.appendChild(title);

  let delay=0;
  cat.groups.forEach(grp=>{
    if(grp.h){
      const lbl=document.createElement('div');
      lbl.className='group-label';
      lbl.textContent=grp.h;
      stage.appendChild(lbl);
    }
    const grid=document.createElement('div');
    grid.className='sentence-grid';
    grp.s.forEach(s=>{
      grid.appendChild(buildCard(s,activeIdx,delay));
      delay+=55;
    });
    stage.appendChild(grid);
  });
}

function buildCard(s,catIdx,delay){
  const color=PALETTE[catIdx%PALETTE.length];
  const bg=CATS[catIdx]?CATS[catIdx].bg:'rgba(255,255,255,0.1)';
  const key=catIdx+'-'+s.t;

  const card=document.createElement('div');
  card.className='sentence-card'+(playedKeys.has(key)?' played':'');
  card.style.cssText=`background:${bg};animation-delay:${delay}ms;`;

  card.innerHTML=`
    <div class="card-emoji">${s.e||'⭐'}</div>
    <div class="card-body">
      <div class="card-sentence">${s.t}</div>
      <div class="card-pronun">🗣 ${s.p||''}</div>
    </div>
    <button class="speak-btn" style="background:${color};" title="Listen!">🔊</button>
  `;

  const btn=card.querySelector('.speak-btn');
  const speak=()=>speakSentence(s.t,btn,key,card);
  btn.addEventListener('click',e=>{e.stopPropagation();speak();});
  card.addEventListener('click',speak);
  return card;
}

// ============================================================
//  SPEECH — very slow for Indian kids
// ============================================================
let currentBtn=null;
function speakSentence(text,btn,key,card){
  if(!window.speechSynthesis){alert('Please use Chrome browser for audio!');return;}
  window.speechSynthesis.cancel();
  if(currentBtn){currentBtn.classList.remove('speaking');}

  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='en-IN';
  utter.rate=speechRate;
  utter.pitch=voiceGender==='female'?1.2:0.85;
  utter.volume=1;

  const FEMALE_NAMES=['samantha','victoria','karen','moira','tessa','veena','raveena',
    'zira','hazel','susan','fiona','allison','ava','serena','google us english'];
  const MALE_NAMES=['alex','tom','daniel','lee','fred','jorge','thomas','david',
    'mark','james','google uk english male'];

  function isFemaleLike(v){
    const n=v.name.toLowerCase();
    return /female/i.test(n)||FEMALE_NAMES.some(k=>n.includes(k));
  }
  function isMaleLike(v){
    const n=v.name.toLowerCase();
    return /\bmale\b/i.test(n)||MALE_NAMES.some(k=>n.includes(k));
  }

  function trySpeak(){
    const voices=window.speechSynthesis.getVoices();
    const en=voices.filter(v=>v.lang.startsWith('en'));
    let v;
    if(voiceGender==='female'){
      v=en.find(isFemaleLike)
        ||voices.find(v=>v.lang==='en-IN')
        ||voices.find(v=>v.lang.startsWith('en-IN'))
        ||en[0];
    } else {
      v=en.find(isMaleLike)
        ||voices.find(v=>v.lang.startsWith('en-GB')&&!isFemaleLike(v))
        ||voices.find(v=>v.lang.startsWith('en')&&!isFemaleLike(v))
        ||en[0];
    }
    if(v)utter.voice=v;
    window.speechSynthesis.speak(utter);
  }

  btn.classList.add('speaking');
  currentBtn=btn;

  utter.onend=()=>{
    btn.classList.remove('speaking');
    currentBtn=null;
    if(!playedKeys.has(key)){
      playedKeys.add(key);
      card.classList.add('played');
      stars++;
      document.getElementById('starCount').textContent=stars;
      updatePips();
      spawnConfetti(btn);
      if(stars>0&&stars%10===0)showBravo();
    }
  };
  utter.onerror=()=>{btn.classList.remove('speaking');currentBtn=null;};

  // Voices may not be ready
  if(window.speechSynthesis.getVoices().length>0){trySpeak();}
  else{window.speechSynthesis.onvoiceschanged=()=>{trySpeak();};}
}

// ============================================================
//  CONFETTI
// ============================================================
const CONFETTI=['⭐','🌟','✨','🎉','💫','🌈','❤️','🎊'];
function spawnConfetti(btn){
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2;const cy=r.top+r.height/2;
  for(let i=0;i<5;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.textContent=CONFETTI[Math.floor(Math.random()*CONFETTI.length)];
    el.style.cssText=`left:${cx+(Math.random()-0.5)*60}px;top:${cy}px;animation-delay:${i*80}ms;font-size:${1.4+Math.random()}rem;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
}

// ============================================================
//  BRAVO
// ============================================================
const BRAVOS=['🌟 Shabash!','🎉 Waah!','💫 Amazing!','🏆 Superstar!','🎊 Brilliant!','⭐ You Rock!','🌈 Fantastic!'];
function showBravo(){
  const ov=document.createElement('div');ov.className='bravo-overlay';
  const bx=document.createElement('div');bx.className='bravo-box';
  bx.textContent=BRAVOS[Math.floor(Math.random()*BRAVOS.length)];
  ov.appendChild(bx);document.body.appendChild(ov);
  setTimeout(()=>ov.remove(),2800);
}

// ============================================================
//  SEARCH
// ============================================================
document.getElementById('searchBox').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){searchMode=false;buildTabs();buildStage();return;}
  searchMode=true;
  searchResults=[];
  CATS.forEach((cat,ci)=>{
    cat.groups.forEach(grp=>{
      grp.s.forEach(s=>{
        if(s.t.toLowerCase().includes(q)||s.p.toLowerCase().includes(q)){
          searchResults.push({s,catIdx:ci});
        }
      });
    });
  });
  buildStage();
});

scrollTopBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

window.speechSynthesis.getVoices();
buildTabs();
buildStage();
updatePips();
</script>
